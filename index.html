<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>AVION Viewer Mobile</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    :root{
      --bg:#070707;
      --panel:rgba(15,15,15,.82);
      --line:rgba(255,255,255,.12);
      --text:#f3f3f3;
      --muted:#bdbdbd;
      --accent:rgba(255,255,255,.16);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, Arial, sans-serif;
      touch-action: none;
    }

    body {
      background:
        radial-gradient(circle at 25% 18%, rgba(255,255,255,.06), transparent 20%),
        radial-gradient(circle at 80% 12%, rgba(255,255,255,.04), transparent 16%),
        linear-gradient(180deg, #0d0d0d 0%, #050505 100%);
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    #scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    .topbar {
      position: absolute;
      left: calc(12px + var(--safe-left));
      right: calc(12px + var(--safe-right));
      top: calc(10px + var(--safe-top));
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
      pointer-events: none;
    }

    .card {
      pointer-events: auto;
      background: var(--panel);
      backdrop-filter: blur(14px);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(0,0,0,.28);
    }

    .titleCard {
      padding: 12px 14px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #d8d8d8;
      margin-bottom: 6px;
    }

    .title {
      margin: 0;
      font-size: 20px;
      line-height: 1.08;
      font-weight: 700;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .controls {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .buttonGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .buttonGrid2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    button, .fileLabel {
      min-height: 46px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      padding: 12px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    button.active {
      background: rgba(255,255,255,.16);
      border-color: rgba(255,255,255,.24);
    }

    button:active, .fileLabel:active {
      transform: scale(.98);
    }

    .fileWrap {
      display: grid;
      gap: 8px;
    }

    .fileLabel {
      position: relative;
      overflow: hidden;
    }

    .fileLabel input {
      position: absolute;
      inset: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
    }

    .bottomPanel {
      position: absolute;
      left: calc(12px + var(--safe-left));
      right: calc(12px + var(--safe-right));
      bottom: calc(12px + var(--safe-bottom));
      z-index: 10;
      display: grid;
      gap: 10px;
      pointer-events: none;
    }

    .statusCard, .sliderCard {
      pointer-events: auto;
      padding: 12px 14px;
    }

    .statusText {
      font-size: 13px;
      line-height: 1.35;
      color: #efefef;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .statusMeta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      font-size: 12px;
      color: var(--muted);
    }

    .statusMeta strong {
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .sliderRow {
      display: grid;
      gap: 8px;
    }

    .sliderRow label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .sliderRow span {
      color: var(--text);
      font-weight: 600;
    }

    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, #202020, #fafafa, #202020);
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #111;
      box-shadow: 0 0 12px rgba(255,255,255,.25);
    }

    .miniHint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    @media (min-width: 768px) {
      .topbar {
        left: 18px;
        right: auto;
        width: 360px;
      }

      .bottomPanel {
        left: 18px;
        right: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>

    <div class="topbar">
      <div class="card titleCard">
        <div class="eyebrow">Mobile STL Viewer</div>
        <h1 class="title">AVION Viewer iPhone</h1>
        <p class="subtitle">Optimizado para tocar, arrastrar y hacer zoom con pellizco.</p>
      </div>

      <div class="card controls">
        <div class="fileWrap">
          <label class="fileLabel">
            Cargar STL manualmente
            <input id="fileInput" type="file" accept=".stl" />
          </label>
          <div class="miniHint">Al abrir, intentará cargar <strong>AVION.stl</strong> automáticamente.</div>
        </div>

        <div class="buttonGrid">
          <button id="resetViewBtn" type="button">Recentrar</button>
          <button id="spinBtn" type="button" class="active">Auto giro</button>
          <button id="wireBtn" type="button">Wireframe</button>
        </div>

        <div class="buttonGrid2">
          <button id="togglePanelBtn" type="button">Ocultar ajustes</button>
          <button id="reloadBtn" type="button">Recargar AVION</button>
        </div>
      </div>
    </div>

    <div class="bottomPanel">
      <div class="card statusCard">
        <div class="statusText" id="status">Intentando cargar AVION.stl...</div>
        <div class="statusMeta">
          <div>Archivo: <strong id="fileName">AVION.stl</strong></div>
          <div>Escala: <strong id="hudScale">0.35x</strong></div>
          <div>Color: <strong id="hudColor">Neutro</strong></div>
          <div>Modo: <strong id="hudMode">Tron</strong></div>
        </div>
      </div>

      <div class="card sliderCard" id="sliderPanel">
        <div class="sliderRow">
          <label for="scaleSlider">Tamaño <span id="scaleValue">0.35x</span></label>
          <input id="scaleSlider" type="range" min="0.35" max="3.2" step="0.01" value="0.35" />
        </div>

        <div class="sliderRow" style="margin-top: 12px;">
          <label for="colorSlider">Color <span id="colorValue">Neutro</span></label>
          <input id="colorSlider" type="range" min="0" max="360" step="1" value="0" />
        </div>

        <div class="sliderRow" style="margin-top: 12px;">
          <label for="lightSlider">Brillo <span id="lightValue">1.20</span></label>
          <input id="lightSlider" type="range" min="0.5" max="2.8" step="0.01" value="1.2" />
        </div>

        <div class="sliderRow" style="margin-top: 12px;">
          <label for="metalSlider">Metal <span id="metalValue">0.45</span></label>
          <input id="metalSlider" type="range" min="0" max="1" step="0.01" value="0.45" />
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { STLLoader } from 'three/addons/loaders/STLLoader.js';

    const canvas = document.getElementById('scene');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const scaleSlider = document.getElementById('scaleSlider');
    const scaleValue = document.getElementById('scaleValue');
    const colorSlider = document.getElementById('colorSlider');
    const colorValue = document.getElementById('colorValue');
    const lightSlider = document.getElementById('lightSlider');
    const lightValue = document.getElementById('lightValue');
    const metalSlider = document.getElementById('metalSlider');
    const metalValue = document.getElementById('metalValue');
    const resetViewBtn = document.getElementById('resetViewBtn');
    const spinBtn = document.getElementById('spinBtn');
    const wireBtn = document.getElementById('wireBtn');
    const togglePanelBtn = document.getElementById('togglePanelBtn');
    const reloadBtn = document.getElementById('reloadBtn');
    const sliderPanel = document.getElementById('sliderPanel');
    const status = document.getElementById('status');
    const hudScale = document.getElementById('hudScale');
    const hudColor = document.getElementById('hudColor');
    const hudMode = document.getElementById('hudMode');

    let autoSpin = true;
    let wireframe = false;
    let materialMode = 'Tron';
    let currentMesh = null;
    let currentBaseScale = 1;
    let panelVisible = true;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.Fog(0x050505, 20, 180);

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: false,
      powerPreference: 'high-performance'
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.01, 5000);
    camera.position.set(0, 30, 120);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.screenSpacePanning = true;
    controls.enablePan = true;
    controls.rotateSpeed = 0.9;
    controls.zoomSpeed = 1.1;
    controls.panSpeed = 0.9;
    controls.minDistance = 0.5;
    controls.maxDistance = 4000;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, parseFloat(lightSlider.value));
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.15);
    const fillLight = new THREE.DirectionalLight(0xcfcfcf, 0.75);
    keyLight.position.set(150, 220, 180);
    fillLight.position.set(-160, 80, -120);
    scene.add(ambientLight, keyLight, fillLight);

    const grid = new THREE.GridHelper(800, 80, 0xffffff, 0x666666);
    grid.material.opacity = 0.08;
    grid.material.transparent = true;
    scene.add(grid);

    const loader = new STLLoader();

    function setStatus(message) {
      status.textContent = message;
    }

    function updateHudScale(value) {
      const text = `${value.toFixed(2)}x`;
      scaleValue.textContent = text;
      hudScale.textContent = text;
    }

    function hueToLabel(hue) {
      if (hue < 15 || hue >= 345) return 'Rojo';
      if (hue < 45) return 'Naranja';
      if (hue < 70) return 'Amarillo';
      if (hue < 160) return 'Verde';
      if (hue < 220) return 'Cian';
      if (hue < 270) return 'Azul';
      if (hue < 320) return 'Morado';
      return 'Magenta';
    }

    function getToneColor() {
      const hue = parseFloat(colorSlider.value);
      const isNeutral = hue === 0;
      const label = isNeutral ? 'Neutro' : hueToLabel(hue);
      const color = isNeutral
        ? new THREE.Color(0xd8d8d8)
        : new THREE.Color().setHSL(hue / 360, 0.18, 0.78);

      colorValue.textContent = label;
      hudColor.textContent = label;
      return { color, label };
    }

    function buildMaterial() {
      return new THREE.MeshPhysicalMaterial({
        color: 0xd8d8d8,
        metalness: parseFloat(metalSlider.value),
        roughness: 0.32,
        clearcoat: 0.35,
        clearcoatRoughness: 0.30,
        emissive: new THREE.Color(0x111111),
        side: THREE.DoubleSide
      });
    }

    function applyMaterialStyle() {
      if (!currentMesh) return;

      const material = currentMesh.material;
      const { color } = getToneColor();
      const metalnessValue = parseFloat(metalSlider.value);

      material.color.copy(color);
      material.wireframe = wireframe;

      if (materialMode === 'Tron') {
        material.metalness = metalnessValue;
        material.roughness = 0.32;
        material.clearcoat = 0.35;
        material.clearcoatRoughness = 0.30;
        material.emissive.copy(color).multiplyScalar(0.13);
      }

      material.needsUpdate = true;
      hudMode.textContent = materialMode;
      metalValue.textContent = metalnessValue.toFixed(2);
    }

    function fitCameraToObject(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      const fov = THREE.MathUtils.degToRad(camera.fov);
      let distance = maxDim / (2 * Math.tan(fov / 2));
      distance *= 2.0;

      camera.near = Math.max(distance / 1000, 0.01);
      camera.far = Math.max(distance * 50, 2000);
      camera.updateProjectionMatrix();

      camera.position.set(
        center.x + distance * 0.2,
        center.y + distance * 0.28,
        center.z + distance
      );

      controls.target.copy(center);
      controls.update();
    }

    function clearCurrentMesh() {
      if (!currentMesh) return;
      scene.remove(currentMesh);
      currentMesh.geometry.dispose();
      currentMesh.material.dispose();
      currentMesh = null;
    }

    function applyAircraftOrientation(mesh) {
      mesh.rotation.set(0, 0, 0);
      mesh.setRotationFromMatrix(new THREE.Matrix4().set(
        0.9955579, -0.0000289, -0.0941515, 0,
       -0.0007069, -0.9999741, -0.0071677, 0,
       -0.0941489,  0.0072024, -0.9955321, 0,
        0,          0,          0,         1
      ));
    }

    function normalizeAndPlaceMesh(mesh) {
      mesh.geometry.computeBoundingBox();
      mesh.geometry.computeBoundingSphere();
      mesh.geometry.computeVertexNormals();

      const box = mesh.geometry.boundingBox.clone();
      const center = box.getCenter(new THREE.Vector3());

      mesh.geometry.translate(-center.x, -center.y, -center.z);
      mesh.scale.setScalar(1);
      mesh.position.set(0, 0, 0);

      applyAircraftOrientation(mesh);

      const tempBox = new THREE.Box3().setFromObject(mesh);
      const tempSize = tempBox.getSize(new THREE.Vector3());
      const maxDim = Math.max(tempSize.x, tempSize.y, tempSize.z) || 1;

      currentBaseScale = 120 / maxDim;
      const userScale = parseFloat(scaleSlider.value);
      mesh.scale.setScalar(currentBaseScale * userScale);

      const placedBox = new THREE.Box3().setFromObject(mesh);
      const placedSize = placedBox.getSize(new THREE.Vector3());

      mesh.position.y = -placedBox.min.y + placedSize.y * 0.02;
      grid.position.y = placedBox.min.y;
    }

    function applyScaleOnly() {
      if (!currentMesh) return;

      const userScale = parseFloat(scaleSlider.value);
      currentMesh.scale.setScalar(currentBaseScale * userScale);

      const box = new THREE.Box3().setFromObject(currentMesh);
      const size = box.getSize(new THREE.Vector3());

      currentMesh.position.y = -box.min.y + size.y * 0.02;
      grid.position.y = box.min.y;

      updateHudScale(userScale);
    }

    function buildMesh(geometry, displayName = 'modelo.stl') {
      clearCurrentMesh();

      const mesh = new THREE.Mesh(geometry, buildMaterial());
      currentMesh = mesh;
      scene.add(mesh);

      fileName.textContent = displayName;

      normalizeAndPlaceMesh(mesh);
      applyMaterialStyle();
      applyScaleOnly();
      fitCameraToObject(mesh);

      setStatus(`Modelo cargado: ${displayName}`);
    }

    function loadGeometryFromArrayBuffer(buffer, displayName = 'modelo.stl') {
      try {
        const geometry = loader.parse(buffer);

        if (
          !geometry ||
          !geometry.attributes ||
          !geometry.attributes.position ||
          geometry.attributes.position.count === 0
        ) {
          throw new Error('Geometría STL vacía o inválida.');
        }

        buildMesh(geometry, displayName);
      } catch (error) {
        console.error(error);
        setStatus('No se pudo leer o visualizar el STL.');
      }
    }

    function handleFile(file) {
      if (!file) return;

      if (!file.name.toLowerCase().endsWith('.stl')) {
        setStatus('Selecciona un archivo con extensión .stl');
        return;
      }

      fileName.textContent = file.name;
      setStatus('Cargando STL manual...');

      file.arrayBuffer()
        .then(buffer => loadGeometryFromArrayBuffer(buffer, file.name))
        .catch(error => {
          console.error(error);
          setStatus('No se pudo cargar el STL manual.');
        });
    }

    async function tryAutoLoadDefaultModel() {
      const defaultFileName = 'AVION.stl';

      try {
        setStatus(`Intentando cargar ${defaultFileName}...`);
        const response = await fetch(`./${defaultFileName}`, { cache: 'no-store' });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const buffer = await response.arrayBuffer();
        loadGeometryFromArrayBuffer(buffer, defaultFileName);
      } catch (error) {
        console.error('Autocarga falló:', error);
        fileName.textContent = 'Ninguno';
        setStatus('No se pudo cargar AVION.stl automáticamente. Usa el botón de carga manual.');
      }
    }

    fileInput.addEventListener('change', event => {
      handleFile(event.target.files?.[0]);
    });

    scaleSlider.addEventListener('input', () => {
      applyScaleOnly();
    });

    colorSlider.addEventListener('input', () => {
      applyMaterialStyle();
    });

    lightSlider.addEventListener('input', () => {
      const intensity = parseFloat(lightSlider.value);
      ambientLight.intensity = intensity;
      lightValue.textContent = intensity.toFixed(2);
    });
    lightValue.textContent = parseFloat(lightSlider.value).toFixed(2);

    metalSlider.addEventListener('input', () => {
      applyMaterialStyle();
    });
    metalValue.textContent = parseFloat(metalSlider.value).toFixed(2);

    resetViewBtn.addEventListener('click', () => {
      if (!currentMesh) return;
      fitCameraToObject(currentMesh);
      setStatus('Vista reiniciada.');
    });

    spinBtn.addEventListener('click', () => {
      autoSpin = !autoSpin;
      spinBtn.classList.toggle('active', autoSpin);
      setStatus(autoSpin ? 'Auto giro activado.' : 'Auto giro pausado.');
    });

    wireBtn.addEventListener('click', () => {
      wireframe = !wireframe;
      wireBtn.classList.toggle('active', wireframe);
      applyMaterialStyle();
      setStatus(wireframe ? 'Wireframe activado.' : 'Wireframe desactivado.');
    });

    togglePanelBtn.addEventListener('click', () => {
      panelVisible = !panelVisible;
      sliderPanel.style.display = panelVisible ? 'block' : 'none';
      togglePanelBtn.textContent = panelVisible ? 'Ocultar ajustes' : 'Mostrar ajustes';
    });

    reloadBtn.addEventListener('click', () => {
      tryAutoLoadDefaultModel();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (currentMesh && autoSpin) {
        currentMesh.rotation.z += delta * 0.30;
      }

      controls.update();
      renderer.render(scene, camera);
    }

    updateHudScale(parseFloat(scaleSlider.value));
    getToneColor();
    animate();
    tryAutoLoadDefaultModel();
  </script>
</body>
</html>
